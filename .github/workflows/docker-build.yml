name: Docker Build and Push

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'agent/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/${OWNER}/nasflow:latest
          docker build -t $IMAGE ./agent
          docker push $IMAGE

      - name: Clean up old untagged images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          clean_package() {
            local pkg=$1
            echo "=== Cleaning ${OWNER}/${pkg} untagged versions ==="
            IDS=$(gh api -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${pkg}/versions" \
              --jq '.[] | select(.metadata.container.tags | length == 0) | .id' 2>/dev/null || true)

            if [ -n "$IDS" ]; then
              for id in $IDS; do
                echo "  Deleting untagged version ${id}..."
                gh api --method DELETE --silent \
                  -H "Accept: application/vnd.github+json" \
                  "/user/packages/container/${pkg}/versions/${id}" || true
              done
            else
              echo "  No untagged versions"
            fi
          }

          clean_package nasflow
        env:
          GH_TOKEN: ${{ github.token }}

  cleanup-legacy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Remove legacy nas-monitor-agent package
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "=== Checking legacy ${OWNER}/nas-monitor-agent ==="

          VERSIONS=$(gh api -H "Accept: application/vnd.github+json" \
            "/user/packages/container/nas-monitor-agent/versions" \
            --jq '.[].id' 2>/dev/null || true)

          if [ -z "$VERSIONS" ]; then
            echo "No legacy nas-monitor-agent package found — nothing to clean"
            exit 0
          fi

          echo "Found legacy nas-monitor-agent with $(echo "$VERSIONS" | wc -l) version(s)"
          for id in $VERSIONS; do
            echo "  Deleting version ${id}..."
            gh api --method DELETE --silent \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/nas-monitor-agent/versions/${id}" || true
          done

          echo "Legacy nas-monitor-agent package cleaned"
        env:
          GH_TOKEN: ${{ github.token }}

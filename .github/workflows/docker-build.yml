name: Docker Build and Push

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'agent/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/${OWNER}/nasflow:latest
          docker build -t $IMAGE ./agent
          docker push $IMAGE

      - name: Clean up old untagged images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          clean_package() {
            local pkg=$1
            echo "=== Cleaning ${OWNER}/${pkg} untagged versions ==="
            IDS=$(gh api -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${pkg}/versions" \
              --jq '.[] | select(.metadata.container.tags | length == 0) | .id' 2>/dev/null || true)

            if [ -n "$IDS" ]; then
              for id in $IDS; do
                echo "  Deleting untagged version ${id}..."
                gh api --method DELETE --silent \
                  -H "Accept: application/vnd.github+json" \
                  "/user/packages/container/${pkg}/versions/${id}" || true
              done
            else
              echo "  No untagged versions"
            fi
          }

          clean_package nasflow
        env:
          GH_TOKEN: ${{ github.token }}
